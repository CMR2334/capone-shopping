name: Ingest + deploy

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ingest-deploy
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run ingestor
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: node ingestor/ingest.js
      - name: Commit updated offers.json
        run: |
          if [[ -n $(git status --porcelain public/offers.json) ]]; then
            git config user.name "capone-shopping-bot"
            git config user.email "bot@users.noreply.github.com"
            git add public/offers.json
            git commit -m "ingest: refresh offers $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            # Retry up to 3 times: if push is rejected by a concurrent run, rebase
            # (prefer our ingestor output on conflict) and retry.
            for i in 1 2 3; do
              git push && break
              git pull --rebase -X theirs
            done
          else
            echo "No changes to offers.json"
          fi

  deploy:
    needs: ingest
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
      # Pages deployments occasionally sit in GitHub's queue until the action's
      # polling times out (service-side incident, e.g. 2026-07-02). Two capped
      # attempts cover transient blips; if both fail we only fail the run when
      # the live site's data is actually stale, so a Pages outage doesn't send
      # a failure email every 15 minutes while ingest keeps working.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          timeout: 300000
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          timeout: 300000
      - name: Fail only if the live site is stale (>2h)
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome != 'success'
        run: |
          set -uo pipefail
          last=$(curl -sf --max-time 30 "https://cmr2334.github.io/capone-shopping/offers.json?nocache=$(date +%s)" | jq -r '.lastUpdated // empty')
          if [ -z "$last" ]; then
            echo "::error::Pages deployment failed and the live offers.json is unreadable."
            exit 1
          fi
          age=$(( $(date -u +%s) - $(date -u -d "$last" +%s) ))
          echo "Deployment failed; live offers.json lastUpdated=$last (${age}s ago)."
          if [ "$age" -lt 7200 ]; then
            echo "::warning::Pages deployment failed (likely a GitHub Pages outage) but live data is <2h old. Tolerating; the next successful run will publish current data."
            exit 0
          fi
          echo "::error::Pages deployment failing and live data is >2h stale."
          exit 1

  # If ingest or deploy fails, surface it as a GitHub issue so a dead refresh token
  # or broken cron is visible instead of offers.json silently going stale.
  notify-failure:
    needs: [ingest, deploy]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Open a failure issue (deduped on an open one)
        run: |
          set -euo pipefail
          gh label create ingest-failure --color B60205 --description "Ingest/deploy workflow failure" 2>/dev/null || true
          existing=$(gh issue list --label ingest-failure --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Failure issue #$existing already open — not duplicating."
            exit 0
          fi
          body=$(printf '%s\n' \
            "The scheduled ingest/deploy workflow failed, so public/offers.json is not being refreshed." \
            "" \
            "Likely causes: an expired GMAIL_REFRESH_TOKEN (rotate it — see HANDOFF.md → Infrastructure & secrets map), a Gmail API/format change, a parser regression, or a prolonged GitHub Pages outage (deploy job only fails after >2h of the live site being stale — check https://www.githubstatus.com). The live site shows a staleness banner once data is ~8h old." \
            "" \
            "Failed run: $RUN_URL" \
            "Commit: $GITHUB_SHA" \
            "" \
            "Close this issue once the pipeline is healthy again; the next failure will open a fresh one.")
          gh issue create --label ingest-failure --title "Ingest workflow failing" --body "$body"
