<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#003a6c" />
<title>Capital One Shopping</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="manifest" href="manifest.json" />
<style>
  :root {
    --paper: #f7f4ec;
    --card: #ffffff;
    --ink: #0f1d33;
    --ink-soft: #2c3a51;
    --muted: #74757b;
    --rule: rgba(15, 29, 51, 0.10);
    --rule-soft: rgba(15, 29, 51, 0.06);
    --navy: #003a6c;
    --navy-soft: #1a4d80;
    --alert: #c8262f;
    --alert-soft: rgba(200, 38, 47, 0.10);
    --warn: #9a6a00;
    --warn-soft: rgba(154, 106, 0, 0.10);
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
    --serif: 'New York', 'Iowan Old Style', 'Charter', Georgia, ui-serif, serif;
    --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', 'Helvetica Neue', Arial, sans-serif;
    color-scheme: light;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-bottom: calc(48px + var(--safe-bottom));
    line-height: 1.45;
    overflow-x: hidden;
  }

  header {
    position: sticky; top: 0; z-index: 10;
    background: color-mix(in srgb, var(--paper) 88%, transparent);
    backdrop-filter: saturate(140%) blur(14px);
    -webkit-backdrop-filter: saturate(140%) blur(14px);
    border-bottom: 1px solid var(--rule);
    padding: calc(18px + var(--safe-top)) 22px 16px;
  }
  .header-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 14px 24px;
    max-width: 1080px; margin: 0 auto;
  }
  .brand {
    display: flex; flex-direction: column;
    gap: 6px;
    min-width: 0;
  }
  .logo-img {
    height: 34px; width: auto;
    display: block;
    flex-shrink: 0;
    align-self: flex-start;
  }
  h1 {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 500;
    margin: 0;
    color: var(--navy);
    letter-spacing: -0.01em;
    line-height: 1.05;
  }
  .subtitle {
    font-size: 12px;
    color: var(--muted);
    font-feature-settings: 'tnum';
    letter-spacing: 0.01em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sync-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--alert);
    flex-shrink: 0;
    transition: background 0.2s ease, box-shadow 0.2s ease;
  }
  .sync-dot.is-synced {
    background: #34c759;
    box-shadow: 0 0 6px rgba(52, 199, 89, 0.45);
  }
  .sync-dot.is-off {
    background: #c8c8cd;
    box-shadow: none;
  }
  .refresh-btn {
    -webkit-appearance: none;
    appearance: none;
    background: none;
    border: 0;
    margin: 0;
    padding: 4px;
    color: var(--muted);
    cursor: pointer;
    line-height: 0;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s ease, background 0.15s ease;
  }
  .refresh-btn:hover { color: var(--navy); background: var(--rule-soft); }
  .refresh-btn:active { color: var(--navy); }
  .refresh-btn svg { width: 15px; height: 15px; display: block; }
  .refresh-btn.is-busy { color: var(--navy); pointer-events: none; }
  .refresh-btn.is-busy svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 820px) {
    .refresh-btn { padding: 6px; }
    .refresh-btn svg { width: 18px; height: 18px; }
  }
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }
  .control { display: flex; align-items: center; }
  .control-label {
    color: var(--muted);
    font-size: 12px;
    margin-right: 6px;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .dropdown {
    appearance: none; -webkit-appearance: none;
    background: transparent;
    color: var(--navy);
    border: none;
    padding: 4px 16px 4px 4px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    text-align-last: center;
    cursor: pointer;
    letter-spacing: -0.005em;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='9' height='6' viewBox='0 0 9 6'><path fill='%23003a6c' d='M4.5 6L0 0h9z'/></svg>");
    background-repeat: no-repeat;
    background-position: right center;
  }
  .dropdown:focus { outline: none; }
  .dropdown option { color: var(--ink); }

  main { max-width: 1080px; margin: 0 auto; padding: 24px 22px 0; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }
  @media (max-width: 820px) {
    header { padding-left: 16px; padding-right: 16px; }
    main { padding: 10px 16px 0; }
    .grid { grid-template-columns: minmax(0, 1fr); gap: 10px; }
    .controls { gap: 12px; }
    .logo-img { height: 28px; }
    .card { padding: 12px 120px 12px 12px; min-height: 92px; }
    .action-btn { padding: 13px; }
    .action-btn svg { width: 26px; height: 26px; }
    .actions { gap: 2px; top: 6px; right: 6px; opacity: 0.9; }
    .expiry-block {
      top: auto;
      bottom: 14px;
      right: 16px;
      transform: none;
    }
  }

  .card {
    position: relative;
    background: var(--card);
    border-radius: 10px;
    border: 1px solid var(--rule-soft);
    padding: 10px 92px 10px 12px;
    display: flex; gap: 14px;
    align-items: center;
    color: var(--ink);
    transition: border-color 0.15s ease, transform 0.12s ease;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .card:active { transform: scale(0.992); }
  @media (hover: hover) {
    .card:hover { border-color: var(--rule); }
    .card:hover .merchant { color: var(--navy); }
  }
  .logo {
    width: 65px; height: 65px;
    border-radius: 9px;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
    border: 1px solid var(--rule-soft);
  }
  .logo img { max-width: 84%; max-height: 84%; object-fit: contain; }
  .logo-fallback {
    font-family: var(--serif);
    font-size: 22px; font-weight: 500;
    color: var(--ink-soft);
  }
  .info {
    flex: 1; min-width: 0;
    text-align: left;
  }
  .percent {
    font-family: var(--sans);
    font-size: 26px; font-weight: 600;
    color: var(--navy);
    line-height: 1.05;
    letter-spacing: -0.02em;
    font-feature-settings: 'tnum';
  }
  .percent .pct-unit {
    font-size: 16px; font-weight: 500;
    color: var(--navy-soft);
    margin-left: 1px;
  }
  .percent .cur-unit {
    font-size: 16px; font-weight: 500;
    color: var(--navy-soft);
    margin-right: 1px;
  }
  .percent .back-word {
    font-size: 12px; font-weight: 500;
    color: var(--muted);
    margin-left: 6px;
    letter-spacing: 0.02em;
    vertical-align: 0.18em;
  }
  .merchant {
    font-size: 15px; font-weight: 500;
    margin-top: 4px;
    color: var(--ink);
    letter-spacing: -0.005em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: color 0.15s ease;
  }
  .expiry-block {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    text-align: right;
    font-size: 12px;
    color: var(--muted);
    font-feature-settings: 'tnum';
    letter-spacing: 0.01em;
    pointer-events: none;
  }
  .badge {
    color: var(--alert);
    background: var(--alert-soft);
    font-size: 9.5px; font-weight: 600;
    padding: 3px 7px; border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
    display: inline-block;
  }
  .cap-below {
    font-size: 0.75rem; font-weight: 400;
    color: var(--muted);
    margin-top: 3px;
    font-feature-settings: 'tnum';
    white-space: nowrap;
  }
  .expiry-soon { color: var(--alert); font-weight: 500; }

  .actions {
    position: absolute;
    top: 8px; right: 8px;
    display: flex;
    flex-direction: row;
    gap: 2px;
    opacity: 0.5;
    transition: opacity 0.15s ease;
    z-index: 2;
  }
  .card:hover .actions { opacity: 1; }
  .action-btn {
    appearance: none;
    background: transparent;
    border: none;
    padding: 5px;
    cursor: pointer;
    color: var(--muted);
    display: flex;
    align-items: center; justify-content: center;
    border-radius: 6px;
    transition: color 0.12s ease, background 0.12s ease;
  }
  .action-btn:hover { background: rgba(15, 29, 51, 0.06); color: var(--ink); }
  .action-btn:active { background: rgba(15, 29, 51, 0.10); }
  .action-btn svg { width: 16px; height: 16px; display: block; }
  .action-btn.is-favorited { color: var(--navy); opacity: 1; }
  .action-btn.is-favorited:hover { background: rgba(0, 58, 108, 0.08); }
  .card .actions:has(.is-favorited) { opacity: 1; }

  .empty {
    text-align: center;
    padding: 96px 20px 60px;
    color: var(--muted);
  }
  .empty h2 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 22px;
    color: var(--ink);
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  .empty p { font-size: 14px; margin: 0; }

  footer {
    max-width: 1080px;
    margin: 40px auto 0;
    padding: 0 22px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    font-feature-settings: 'tnum';
    letter-spacing: 0.02em;
  }

  .notice {
    max-width: 1080px;
    margin: 0 auto;
    padding: 10px 22px;
    font-size: 13px;
    letter-spacing: 0.01em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .notice[hidden] { display: none; }
  .notice .notice-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }
  .notice.is-stale {
    background: var(--warn-soft);
    color: var(--warn);
    border-bottom: 1px solid color-mix(in srgb, var(--warn) 22%, transparent);
  }
  .notice.is-error {
    background: var(--alert-soft);
    color: var(--alert);
    border-bottom: 1px solid color-mix(in srgb, var(--alert) 22%, transparent);
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="brand">
      <img src="logo.png" alt="Capital One Shopping" class="logo-img" id="brandLogo"
           onerror="this.style.display='none'; document.getElementById('brandText').hidden=false;" />
      <h1 id="brandText" hidden>Capital One Shopping</h1>
      <div class="subtitle">
        <span id="subtitleText">Loading…</span>
        <span class="sync-dot is-off" id="syncDot" title="Sync not set up"></span>
        <button id="refreshBtn" class="refresh-btn" type="button" title="Check for new offers" aria-label="Check for new offers">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v5h-5"/></svg>
        </button>
      </div>
    </div>
    <div class="controls">
      <div class="control">
        <span class="control-label">View</span>
        <select class="dropdown" id="viewSelect" aria-label="View">
          <option value="all">All</option>
          <option value="favorites">Favorites</option>
          <option value="hidden">Hidden</option>
        </select>
      </div>
      <div class="control">
        <span class="control-label">Sort by</span>
        <select class="dropdown" id="sortSelect" aria-label="Sort">
          <option value="percent">Highest %</option>
          <option value="expiring">Expiring soonest</option>
          <option value="newest">Newest</option>
        </select>
      </div>
    </div>
  </div>
</header>

<div class="notice" id="notice" role="status" hidden><span class="notice-dot"></span><span id="noticeText"></span></div>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" hidden>
    <h2 id="emptyTitle">No active offers yet</h2>
    <p id="emptyMsg">Once your inbox has Capital One Shopping emails, they'll show here.</p>
  </div>
</main>

<footer id="footer"></footer>

<script>
(() => {
  const APP_VERSION = 'v0.2.0'; // bump with package.json on each meaningful release
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const emptyTitle = document.getElementById('emptyTitle');
  const emptyMsg = document.getElementById('emptyMsg');
  const subtitleText = document.getElementById('subtitleText');
  const syncDot = document.getElementById('syncDot');
  const footer = document.getElementById('footer');
  const notice = document.getElementById('notice');
  const noticeText = document.getElementById('noticeText');
  const refreshBtn = document.getElementById('refreshBtn');

  let lastSyncOk = false;

  function setSyncDot() {
    const token = getSyncToken();
    if (!token) {
      syncDot.className = 'sync-dot is-off';
      syncDot.title = 'Sync not set up';
    } else if (lastSyncOk) {
      syncDot.className = 'sync-dot is-synced';
      syncDot.title = 'Synced across devices';
    } else {
      syncDot.className = 'sync-dot';
      syncDot.title = 'Sync error — check connection';
    }
  }
  const sortSelect = document.getElementById('sortSelect');
  const viewSelect = document.getElementById('viewSelect');

  const ICON_STAR = '<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round"><path d="M12 2.8l2.83 5.74 6.33.92-4.58 4.47 1.08 6.3L12 17.27l-5.66 2.97 1.08-6.3L2.84 9.46l6.33-.92L12 2.8z"/></svg>';
  const ICON_STAR_FILLED = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"><path d="M12 2.8l2.83 5.74 6.33.92-4.58 4.47 1.08 6.3L12 17.27l-5.66 2.97 1.08-6.3L2.84 9.46l6.33-.92L12 2.8z"/></svg>';
  const ICON_HIDE = '<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>';
  const ICON_UNHIDE = '<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 12C5 7.5 8.5 5.5 12 5.5s7 2 9.5 6.5c-2.5 4.5-6 6.5-9.5 6.5s-7-2-9.5-6.5z"/><circle cx="12" cy="12" r="2.6"/></svg>';

  let data = null;

  // Offers refresh on a ~15-min cron; 8h+ since the last successful refresh almost
  // certainly means the pipeline is broken (dead refresh token, disabled workflow),
  // not just a few skipped runs — surface it instead of silently showing stale data.
  const STALE_HOURS = 8;
  function setNotice(kind, msg) {
    if (!kind) { notice.hidden = true; return; }
    notice.className = 'notice is-' + kind;
    noticeText.textContent = msg;
    notice.hidden = false;
  }

  const KEY_FAV = 'capone:favorites';
  const KEY_HIDE = 'capone:hidden';
  const KEY_TOKEN = 'capone:sync-token';
  const SYNC_URL = 'https://capone-offers-sync.cmr2334.workers.dev';

  // Shared sync identity. The worker keys state by token (bucket = state:<token>),
  // so every device using THIS token reads/writes ONE shared bucket — true
  // cross-device sync with zero per-device setup. This replaces the old
  // crypto.randomUUID() fallback, which silently gave each device its own
  // private bucket (green "synced" dot but no actual sharing).
  // ?sync=OTHER still overrides if you ever want a separate namespace.
  const SHARED_SYNC_TOKEN = 'c1s-shared-9f3a7c2e8b1d4056a9e7f240c8b6135e';

  (function bootstrapSyncToken() {
    const params = new URLSearchParams(window.location.search);
    const t = params.get('sync');
    if (t) {
      // Explicit override for this session (rarely needed — e.g. a separate namespace).
      localStorage.setItem(KEY_TOKEN, t);
      params.delete('sync');
      const search = params.toString();
      const clean = window.location.pathname + (search ? '?' + search : '') + window.location.hash;
      window.history.replaceState({}, '', clean);
    } else if (localStorage.getItem(KEY_TOKEN) !== SHARED_SYNC_TOKEN) {
      // Always converge on the one shared bucket unless ?sync= is explicitly present.
      // Overwrites ANY older token — a random UUID from the old build OR the original
      // hex token from May — so every device lands on the same bucket. Local favorites
      // in localStorage are preserved and pushed up to the shared bucket on load.
      localStorage.setItem(KEY_TOKEN, SHARED_SYNC_TOKEN);
    }
  })();

  function getSyncToken() {
    return localStorage.getItem(KEY_TOKEN);
  }

  function getFavorites() {
    try { return new Set(JSON.parse(localStorage.getItem(KEY_FAV) || '[]')); }
    catch { return new Set(); }
  }
  function setFavorites(s) {
    localStorage.setItem(KEY_FAV, JSON.stringify([...s]));
    pushToSync();
  }
  function getHidden() {
    try { return JSON.parse(localStorage.getItem(KEY_HIDE) || '{}'); }
    catch { return {}; }
  }
  function setHidden(h) {
    localStorage.setItem(KEY_HIDE, JSON.stringify(h));
    pushToSync();
  }

  async function pullFromSync() {
    const token = getSyncToken();
    if (!token) return null;
    try {
      const res = await fetch(`${SYNC_URL}/state`, {
        headers: { 'Authorization': 'Bearer ' + token },
        cache: 'no-store',
      });
      if (!res.ok) { lastSyncOk = false; setSyncDot(); return null; }
      lastSyncOk = true;
      setSyncDot();
      return await res.json();
    } catch (err) {
      lastSyncOk = false;
      setSyncDot();
      console.warn('sync pull failed:', err);
      return null;
    }
  }

  function pushToSync() {
    const token = getSyncToken();
    if (!token) return;
    const favorites = [...getFavorites()];
    const hidden = getHidden();
    fetch(`${SYNC_URL}/state`, {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ favorites, hidden }),
    }).then(res => {
      lastSyncOk = res.ok;
      setSyncDot();
    }).catch(err => {
      lastSyncOk = false;
      setSyncDot();
      console.warn('sync push failed:', err);
    });
  }

  async function syncOnLoad() {
    const token = getSyncToken();
    if (!token) return;
    const remote = await pullFromSync();
    if (!remote) return;
    const remoteHasData =
      (Array.isArray(remote.favorites) && remote.favorites.length > 0) ||
      (remote.hidden && typeof remote.hidden === 'object' && Object.keys(remote.hidden).length > 0);
    if (remoteHasData) {
      localStorage.setItem(KEY_FAV, JSON.stringify(remote.favorites || []));
      localStorage.setItem(KEY_HIDE, JSON.stringify(remote.hidden || {}));
    } else {
      const localFavs = [...getFavorites()];
      const localHidden = getHidden();
      if (localFavs.length > 0 || Object.keys(localHidden).length > 0) {
        pushToSync();
      }
    }
  }

  function fmtExpiry(iso) {
    if (!iso) return '';
    const exp = new Date(iso);
    const now = new Date();
    const diffMs = exp - now;
    const diffDays = Math.floor(diffMs / 86400000);
    if (diffMs < 0) return 'expired';
    if (diffMs < 3600000) return `expires in ${Math.max(1, Math.floor(diffMs / 60000))} min`;
    if (diffDays === 0) return 'expires today';
    if (diffDays === 1) return 'expires tomorrow';
    if (diffDays < 7) return `${diffDays} days left`;
    return `expires ${exp.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}`;
  }

  function isSoon(iso) {
    if (!iso) return false;
    return (new Date(iso) - new Date()) < 36 * 3600 * 1000;
  }

  function offerValue(o) { return o.dollarBack != null ? o.dollarBack : o.percentBack; }

  function sortOffers(offers, mode) {
    const s = [...offers];
    if (mode === 'percent') s.sort((a, b) => (b.percentBack ?? -1) - (a.percentBack ?? -1) || (b.dollarBack ?? 0) - (a.dollarBack ?? 0));
    if (mode === 'expiring') s.sort((a, b) => new Date(a.expiresAt || 0) - new Date(b.expiresAt || 0));
    if (mode === 'newest') s.sort((a, b) => new Date(b.emailDate || 0) - new Date(a.emailDate || 0));
    return s;
  }

  function filterOffers(offers, view, favs, hidden) {
    if (view === 'favorites') {
      return offers.filter(o => favs.has(o.merchant));
    }
    if (view === 'hidden') {
      return offers.filter(o => {
        const t = hidden[o.merchant];
        return t != null && offerValue(o) <= t;
      });
    }
    return offers.filter(o => {
      const t = hidden[o.merchant];
      if (t == null) return true;
      return offerValue(o) > t;
    });
  }

  function render() {
    if (!data) return;
    const favs = getFavorites();
    const hidden = getHidden();
    const view = viewSelect.value;
    const filtered = filterOffers(data.offers, view, favs, hidden);
    const sorted = sortOffers(filtered, sortSelect.value);

    if (sorted.length === 0) {
      grid.hidden = true;
      empty.hidden = false;
      if (view === 'favorites') {
        emptyTitle.textContent = 'No favorites yet';
        emptyMsg.textContent = 'Tap the star on any offer to save it here.';
      } else if (view === 'hidden') {
        emptyTitle.textContent = 'Nothing hidden';
        emptyMsg.textContent = 'Hidden offers stay hidden until the merchant returns at a higher rate.';
      } else {
        emptyTitle.textContent = 'No active offers yet';
        emptyMsg.textContent = "Once your inbox has Capital One Shopping emails, they'll show here.";
      }
      return;
    }
    grid.hidden = false;
    empty.hidden = true;

    grid.innerHTML = sorted.map(o => {
      const soon = isSoon(o.expiresAt);
      const expClass = soon ? 'expiry-soon' : '';
      const isFav = favs.has(o.merchant);
      const isHiddenView = view === 'hidden';

      const logoHtml = o.logoUrl
        ? `<img src="${escapeAttr(o.logoUrl)}" alt="${escapeAttr(o.merchant)}" loading="lazy" onerror="this.parentNode.innerHTML='<span class=\\'logo-fallback\\'>${escapeAttr(o.merchant.charAt(0).toUpperCase())}</span>'"/>`
        : `<span class="logo-fallback">${escapeAttr(o.merchant.charAt(0).toUpperCase())}</span>`;

      const capBelow = o.capAmount ? `<div class="cap-below">(up to $${o.capAmount})</div>` : '';
      const rewardHtml = o.dollarBack != null
        ? `<span class="cur-unit">$</span>${o.dollarBack}<span class="back-word">back</span>`
        : `${o.percentBack}<span class="pct-unit">%</span><span class="back-word">back</span>`;
      const expiryContent = o.source === 'todays-top'
        ? `<span class="badge">Today's top</span>`
        : `<span class="${expClass}">${fmtExpiry(o.expiresAt)}</span>${capBelow}`;

      let actionsHtml;
      if (isHiddenView) {
        actionsHtml = `<button class="action-btn" data-action="unhide" aria-label="Unhide ${escapeAttr(o.merchant)}" title="Unhide">${ICON_UNHIDE}</button>`;
      } else {
        actionsHtml = `
          <button class="action-btn ${isFav ? 'is-favorited' : ''}" data-action="favorite" aria-label="${isFav ? 'Unfavorite' : 'Favorite'} ${escapeAttr(o.merchant)}" title="${isFav ? 'Unfavorite' : 'Favorite'}">${isFav ? ICON_STAR_FILLED : ICON_STAR}</button>
          <button class="action-btn" data-action="hide" aria-label="Hide ${escapeAttr(o.merchant)}" title="Hide unless higher %">${ICON_HIDE}</button>
        `;
      }

      return `
        <div class="card" data-href="${escapeAttr(o.activationUrl || '')}" data-merchant="${escapeAttr(o.merchant)}" data-value="${offerValue(o)}" role="link" tabindex="0">
          <div class="logo">${logoHtml}</div>
          <div class="info">
            <div class="percent">${rewardHtml}</div>
            <div class="merchant">${escapeHtml(o.merchant)}</div>
          </div>
          <div class="expiry-block">${expiryContent}</div>
          <div class="actions">${actionsHtml}</div>
        </div>
      `;
    }).join('');
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
  }
  function escapeAttr(s) {
    return String(s).replace(/["&<>]/g, c => ({ '"':'&quot;','&':'&amp;','<':'&lt;','>':'&gt;' }[c]));
  }

  async function load() {
    try {
      const res = await fetch(`offers.json?t=${Date.now()}`, { cache: 'no-store' });
      data = await res.json();
      await syncOnLoad();
      const updated = data.lastUpdated ? new Date(data.lastUpdated) : null;
      const favs = getFavorites();
      const hidden = getHidden();
      const visibleAll = filterOffers(data.offers, 'all', favs, hidden).length;
      subtitleText.textContent = `${visibleAll} active · updated ${updated ? timeAgo(updated) : 'just now'}`;
      const ageHours = updated ? (Date.now() - updated.getTime()) / 3.6e6 : Infinity;
      if (ageHours >= STALE_HOURS) {
        setNotice('stale', `Offers may be out of date — last refreshed ${timeAgo(updated)}. The feed updates automatically every ~15 min.`);
      } else {
        setNotice(null);
      }
      const parseFailures = data.parseFailures || 0;
      footer.textContent = `${APP_VERSION} · Last update: ${updated ? updated.toLocaleString() : '—'}`
        + (parseFailures ? ` · ${parseFailures} parse issue${parseFailures > 1 ? 's' : ''}` : '');
      setSyncDot();
      render();
    } catch (err) {
      subtitleText.textContent = 'Could not load offers';
      setNotice('error', 'Couldn’t load the latest offers — check your connection. Showing the last loaded data if available.');
      console.error(err);
    }
  }

  function timeAgo(d) {
    const s = Math.floor((Date.now() - d.getTime()) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    if (s < 86400) return `${Math.floor(s/3600)}h ago`;
    return `${Math.floor(s/86400)}d ago`;
  }

  function openOffer(card) {
    const href = card.dataset.href;
    if (href && href !== '') window.open(href, '_blank', 'noopener,noreferrer');
  }

  grid.addEventListener('click', (e) => {
    const actionBtn = e.target.closest('[data-action]');
    if (actionBtn) {
      e.stopPropagation();
      e.preventDefault();
      const action = actionBtn.dataset.action;
      const card = actionBtn.closest('.card');
      const merchant = card.dataset.merchant;
      if (action === 'favorite') {
        const favs = getFavorites();
        if (favs.has(merchant)) favs.delete(merchant);
        else favs.add(merchant);
        setFavorites(favs);
      } else if (action === 'hide') {
        const hidden = getHidden();
        hidden[merchant] = parseFloat(card.dataset.value);
        setHidden(hidden);
      } else if (action === 'unhide') {
        const hidden = getHidden();
        delete hidden[merchant];
        setHidden(hidden);
      }
      render();
      return;
    }
    const card = e.target.closest('.card');
    if (card) openOffer(card);
  });

  grid.addEventListener('keydown', (e) => {
    if ((e.key === 'Enter' || e.key === ' ') && e.target.classList.contains('card')) {
      e.preventDefault();
      openOffer(e.target);
    }
  });

  sortSelect.addEventListener('change', render);
  viewSelect.addEventListener('change', render);

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') load();
  });

  // Manual refresh: instantly re-pull published offers, and (if the Worker is
  // configured) trigger a fresh Gmail ingest, re-pulling a few times as it lands.
  const REFRESH_REPULL_MS = [8000, 20000, 40000, 70000];
  let refreshTimers = [];
  async function manualRefresh() {
    if (refreshBtn.classList.contains('is-busy')) return;
    refreshBtn.classList.add('is-busy');
    refreshTimers.forEach(clearTimeout);
    refreshTimers = [];
    await load(); // instant re-pull of the latest published data
    let triggered = false;
    try {
      const res = await fetch(`${SYNC_URL}/refresh`, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + (getSyncToken() || '') },
      });
      triggered = res.status === 202;
    } catch { /* offline or worker unreachable — the instant re-pull already ran */ }
    if (triggered) {
      // Fresh data lands in ~30–90s; re-pull a few times, then stop the spinner.
      REFRESH_REPULL_MS.forEach(ms => refreshTimers.push(setTimeout(load, ms)));
      refreshTimers.push(setTimeout(
        () => refreshBtn.classList.remove('is-busy'),
        REFRESH_REPULL_MS[REFRESH_REPULL_MS.length - 1] + 1500));
    } else {
      refreshBtn.classList.remove('is-busy');
    }
  }
  refreshBtn.addEventListener('click', manualRefresh);

  load();
  setInterval(load, 5 * 60 * 1000);
})();
</script>
</body>
</html>
