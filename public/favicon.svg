<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="96" fill="#ffffff"/>

  <!-- Capital One logo image (authentic wordmark from logo.png) -->
  <image href="logo.png" x="30" y="45" width="452" height="175"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- Envelope body (frame behind cart) -->
  <rect x="107" y="238" width="297" height="220" rx="18" fill="#ece4cc"/>
  <!-- Envelope flap -->
  <path d="M 115 248 L 256 330 L 397 248"
        fill="none" stroke="#8a7a4a" stroke-width="5"
        stroke-linejoin="round" stroke-linecap="round" opacity="0.35"/>

  <!-- Shopping cart — scaled up to 1.6× and centered on envelope (256,348)
       leaves ~20px envelope border on left/right and ~28px top/bottom -->
  <g transform="translate(256,348) scale(1.6) translate(-258.5,-337)"
     fill="none" stroke="#5980a3" stroke-width="12"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M 178 286 L 207 286"/>
    <path d="M 207 286 L 230 358 L 318 358 L 339 296 L 215 296"/>
    <line x1="222" y1="318" x2="333" y2="318"/>
    <line x1="226" y1="340" x2="329" y2="340"/>
    <line x1="248" y1="296" x2="251" y2="358"/>
    <line x1="278" y1="296" x2="282" y2="358"/>
    <line x1="308" y1="296" x2="312" y2="358"/>
    <circle cx="244" cy="378" r="10"/>
    <circle cx="312" cy="378" r="10"/>
  </g>
</svg>
